<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vehicall Admin - Fleet B2B</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #07111f;
      color: #ffffff;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 28px;
      background: #0b1b2d;
      border-bottom: 1px solid #1d3553;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand img {
      height: 42px;
      width: auto;
    }

    .brand h2 {
      margin: 0;
      font-size: 20px;
    }

    .nav a {
      color: #6ecbff;
      margin-left: 18px;
      text-decoration: none;
      font-size: 14px;
    }

    .container {
      max-width: 1200px;
      margin: 30px auto;
      padding: 0 20px;
    }

    .title-box {
      background: #0f1f33;
      border: 1px solid #1d3553;
      border-radius: 18px;
      padding: 24px;
      margin-bottom: 22px;
    }

    .title-box h1 {
      margin: 0 0 8px;
    }

    .title-box p {
      margin: 0;
      color: #b7c4d4;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
      margin-bottom: 22px;
    }

    .stat-card {
      background: #0f1f33;
      border: 1px solid #1d3553;
      border-radius: 16px;
      padding: 18px;
    }

    .stat-card span {
      color: #9fb0c5;
      font-size: 13px;
    }

    .stat-card h3 {
      margin: 8px 0 0;
      font-size: 28px;
      color: #6ecbff;
    }

    .company-card {
      background: #0f1f33;
      border: 1px solid #1d3553;
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .company-head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .company-head h3 {
      margin: 0;
      font-size: 22px;
    }

    .badge {
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
      text-transform: uppercase;
    }

    .pending {
      background: rgba(255, 193, 7, 0.15);
      color: #ffd86b;
      border: 1px solid rgba(255, 193, 7, 0.4);
    }

    .active {
      background: rgba(0, 200, 130, 0.15);
      color: #7dffce;
      border: 1px solid rgba(0, 200, 130, 0.4);
    }

    .suspended {
      background: rgba(255, 80, 80, 0.15);
      color: #ff9f9f;
      border: 1px solid rgba(255, 80, 80, 0.4);
    }

    .details {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 15px;
      color: #d6e2f0;
      font-size: 14px;
    }

    .details div {
      background: #081827;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #263b55;
    }

    .details strong {
      display: block;
      color: #8fb3d9;
      margin-bottom: 5px;
      font-size: 12px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    button, select {
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid #263b55;
      background: #081827;
      color: #ffffff;
      cursor: pointer;
    }

    button.primary {
      background: linear-gradient(135deg, #00c2ff, #0066ff);
      border: none;
      font-weight: bold;
    }

    button.warning {
      background: #8a5a00;
      border: none;
    }

    button.danger {
      background: #8a1f1f;
      border: none;
    }

    #message {
      display: none;
      margin-bottom: 18px;
      padding: 13px;
      border-radius: 12px;
    }

    .msg-success {
      display: block !important;
      background: rgba(0, 180, 120, 0.15);
      color: #70ffc8;
      border: 1px solid rgba(0, 180, 120, 0.35);
    }

    .msg-error {
      display: block !important;
      background: rgba(255, 70, 70, 0.15);
      color: #ff9c9c;
      border: 1px solid rgba(255, 70, 70, 0.35);
    }

    @media (max-width: 900px) {
      .stats, .details {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 600px) {
      .header {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
      }

      .stats, .details {
        grid-template-columns: 1fr;
      }

      .brand img {
        height: 36px;
      }
    }
  </style>
</head>

<body>
  <div class="header">
    <div class="brand">
      <img src="/logo.png" alt="Vehicall Logo" />
      <div>
        <h2>Vehicall Admin</h2>
        <small>Fleet B2B Management</small>
      </div>
    </div>

    <div class="nav">
      <a href="/admin-dashboard.html">Admin Dashboard</a>
      <a href="/admin/logout">Logout</a>
    </div>
  </div>

  <div class="container">
    <div class="title-box">
      <h1>Fleet B2B Companies</h1>
      <p>Approve, activate, suspend, and manage Fleet Management customers.</p>
    </div>

    <div id="message"></div>

    <div class="stats">
      <div class="stat-card">
        <span>Total Companies</span>
        <h3 id="totalCompanies">0</h3>
      </div>
      <div class="stat-card">
        <span>Active</span>
        <h3 id="activeCompanies">0</h3>
      </div>
      <div class="stat-card">
        <span>Pending</span>
        <h3 id="pendingCompanies">0</h3>
      </div>
      <div class="stat-card">
        <span>Suspended</span>
        <h3 id="suspendedCompanies">0</h3>
      </div>
    </div>

    <div id="companiesList"></div>
<div class="title-box">
  <h1>Pending Upgrade Requests</h1>
  <p>Review and approve fleet package upgrade requests.</p>
</div>

<div id="upgradeRequests"></div>
  </div>

  <script>
    const companiesList = document.getElementById("companiesList");
    const messageBox = document.getElementById("message");

    function showMessage(text, type = "success") {
      messageBox.className = type === "success" ? "msg-success" : "msg-error";
      messageBox.textContent = text;
      setTimeout(() => {
        messageBox.className = "";
        messageBox.style.display = "none";
      }, 4000);
    }

    function statusBadge(status) {
      const cls = status === "active" ? "active" : status === "suspended" ? "suspended" : "pending";
      return `<span class="badge ${cls}">${status || "pending"}</span>`;
    }

    async function loadCompanies() {
      try {
        const res = await fetch("/admin/fleet-companies-data");
        const companies = await res.json();

        document.getElementById("totalCompanies").textContent = companies.length;
        document.getElementById("activeCompanies").textContent = companies.filter(c => c.status === "active").length;
        document.getElementById("pendingCompanies").textContent = companies.filter(c => c.status === "pending").length;
        document.getElementById("suspendedCompanies").textContent = companies.filter(c => c.status === "suspended").length;

        companiesList.innerHTML = "";

        if (!companies.length) {
          companiesList.innerHTML = `
            <div class="company-card">
              <p>No Fleet B2B company registered yet.</p>
            </div>
          `;
          return;
        }

        companies.forEach(company => {
          companiesList.innerHTML += `
            <div class="company-card">
              <div class="company-head">
                <h3>${company.companyName || ""}</h3>
                ${statusBadge(company.status)}
              </div>

              <div class="details">
                <div><strong>CR Number</strong>${company.crNumber || "-"}</div>
                <div><strong>Contact Person</strong>${company.contactPerson || "-"}</div>
                <div><strong>Mobile</strong>${company.mobile || "-"}</div>
                <div><strong>Email</strong>${company.email || "-"}</div>
                <div><strong>Package</strong>${company.packageLabel || company.packageType || "-"}</div>
                <div><strong>Vehicle Limit</strong>${company.vehicleLimit || 0}</div>
                <div><strong>Used Vehicles</strong>${company.usedVehicles || 0}</div>
                <div><strong>Alert Option</strong>${company.alertOption === "with_alerts" ? "With Vehicall Alerts" : "Fleet Management Only"}</div>
                <div><strong>Payment Status</strong>${company.paymentStatus || "-"}</div>
              </div>

              <div class="actions">
                ${
                  company.status !== "active"
                    ? `<button class="primary" onclick="approveCompany('${company.id}')">Approve & Activate</button>`
                    : ""
                }

                <button class="warning" onclick="updateStatus('${company.id}', 'pending')">Mark Pending</button>
                <button class="danger" onclick="updateStatus('${company.id}', 'suspended')">Suspend</button>
                <button class="primary" onclick="updateStatus('${company.id}', 'active')">Activate</button>

                <select id="package-${company.id}">
                  <option value="starter">Starter - 10 Vehicles</option>
                  <option value="business">Business - 50 Vehicles</option>
                  <option value="enterprise">Enterprise - 100 Vehicles</option>
                </select>

                <select id="alert-${company.id}">
                  <option value="without_alerts">Fleet Management Only</option>
                  <option value="with_alerts">Fleet + Alerts</option>
                </select>

                <button onclick="changePackage('${company.id}')">Update Package</button>
              </div>
            </div>
          `;
        });

      } catch (error) {
        console.error(error);
        showMessage("Unable to load Fleet B2B companies.", "error");
      }
    }

    async function approveCompany(companyId) {
      try {
        const res = await fetch("/admin/fleet/approve", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ companyId })
        });

        const data = await res.json();
        showMessage(data.message, data.success ? "success" : "error");
       
      } catch (error) {
        showMessage("Approval failed.", "error");
      }
    }

    async function updateStatus(companyId, status) {
      try {
        const res = await fetch("/admin/fleet/update-status", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ companyId, status })
        });

        const data = await res.json();
        showMessage(data.message, data.success ? "success" : "error");
        loadCompanies();
      } catch (error) {
        showMessage("Status update failed.", "error");
      }
    }

    async function changePackage(companyId) {
      try {
        const packageType = document.getElementById(`package-${companyId}`).value;
        const alertOption = document.getElementById(`alert-${companyId}`).value;

        const res = await fetch("/admin/fleet/change-package", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ companyId, packageType, alertOption })
        });

        const data = await res.json();
        showMessage(data.message, data.success ? "success" : "error");
        loadCompanies();
      } catch (error) {
        showMessage("Package update failed.", "error");
      }
    }

    loadCompanies();
async function loadUpgradeRequests() {

  try {

    const res = await fetch("/admin/fleet-upgrade-requests");

    const requests = await res.json();

    const box = document.getElementById("upgradeRequests");

    box.innerHTML = "";

    if (!requests.length) {

      box.innerHTML = `
        <div class="company-card">
          No pending upgrade requests.
        </div>
      `;

      return;
    }

    requests.forEach(req => {

      box.innerHTML += `

        <div class="company-card">

          <div class="company-head">
            <h3>${req.companyName || "-"}</h3>
            <span class="badge pending">
              ${req.status || "pending"}
            </span>
          </div>

          <div class="details">

            <div>
              <strong>Current Package</strong>
              ${req.currentPackageLabel || "-"}
            </div>

            <div>
              <strong>Requested Package</strong>
              ${req.requestedPackageLabel || "-"}
            </div>

            <div>
              <strong>Requested Vehicle Limit</strong>
              ${req.requestedVehicleLimit || 0}
            </div>

            <div>
              <strong>Alert Option</strong>
              ${req.requestedAlertOption || "-"}
            </div>

            <div>
              <strong>Billing Cycle</strong>
              ${req.billingCycle || "-"}
            </div>

            <div>
              <strong>Payment Status</strong>
              ${req.paymentStatus || "pending"}
            </div>

            <div style="grid-column:span 3;">
              <strong>Remarks</strong>
              ${req.remarks || "-"}
            </div>

          </div>

          <div class="actions">

            <button class="primary"
              onclick="approveUpgrade('${req.id}')">
              Approve Upgrade
            </button>

            <button class="danger"
              onclick="rejectUpgrade('${req.id}')">
              Reject
            </button>

          </div>

        </div>

      `;
    });

  } catch (error) {

    console.error(error);
  }
}

async function approveUpgrade(requestId) {

  try {

    const res = await fetch("/admin/fleet/approve-upgrade", {

      method: "POST",

      headers: {
        "Content-Type": "application/json"
      },

      body: JSON.stringify({ requestId })
    });

    const data = await res.json();

    showMessage(
      data.message,
      data.success ? "success" : "error"
    );

    loadCompanies();
    loadUpgradeRequests();

  } catch (error) {

    showMessage("Upgrade approval failed.","error");
  }
}

async function rejectUpgrade(requestId) {

  try {

    const res = await fetch("/admin/fleet/reject-upgrade", {

      method: "POST",

      headers: {
        "Content-Type": "application/json"
      },

      body: JSON.stringify({ requestId })
    });

    const data = await res.json();

    showMessage(
      data.message,
      data.success ? "success" : "error"
    );
  
    loadUpgradeRequests();

  } catch (error) {

    showMessage("Upgrade rejection failed.","error");
  }
}

loadCompanies();
loadUpgradeRequests();

</script>
</body>
</html>
