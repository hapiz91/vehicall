<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vehicall Alert</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      background: linear-gradient(135deg, #eef6ff, #ffffff);
      color: #0b1f3a;
      min-height: 100vh;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 22px;
      background: #ffffff;
      border-bottom: 1px solid #e5eaf0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: bold;
      font-size: 20px;
    }

    .brand img {
      width: 42px;
      height: 42px;
      object-fit: contain;
    }

    .lang-switch {
      display: flex;
      gap: 8px;
    }

    .lang-switch button {
      border: 1px solid #cbd5e1;
      background: #ffffff;
      padding: 8px 14px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
      color: #0b1f3a;
    }

    .lang-switch button.active {
      background: #0b1f3a;
      color: #ffffff;
    }

    .container {
      max-width: 520px;
      margin: 40px auto;
      padding: 20px;
    }

    .card {
      background: #ffffff;
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 15px 40px rgba(11, 31, 58, 0.12);
      text-align: center;
    }

    .logo {
      width: 90px;
      margin-bottom: 10px;
    }

    h1 {
      margin: 10px 0;
      font-size: 28px;
      color: #0b1f3a;
    }

    .subtitle {
      color: #64748b;
      font-size: 15px;
      margin-bottom: 25px;
      line-height: 1.6;
    }

    .vehicle-box {
      background: #f1f7ff;
      border: 1px solid #d8e9ff;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 22px;
    }

    .vehicle-label {
      color: #64748b;
      font-size: 13px;
      margin-bottom: 6px;
    }

    .vehicle-id {
      font-size: 22px;
      font-weight: bold;
      color: #003f8f;
    }

    .alerts {
      display: grid;
      gap: 12px;
      margin-top: 20px;
    }

    .alert-btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 16px;
      background: #0b1f3a;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    .alert-btn:hover {
      background: #003f8f;
      transform: translateY(-1px);
    }

    .emergency {
      background: #b91c1c;
    }

    .emergency:hover {
      background: #991b1b;
    }

    .message-box {
      display: none;
      margin-top: 20px;
      padding: 16px;
      border-radius: 16px;
      background: #ecfdf5;
      color: #065f46;
      font-weight: bold;
      line-height: 1.6;
    }

    .footer-note {
      margin-top: 18px;
      font-size: 13px;
      color: #64748b;
      line-height: 1.6;
    }

    body.rtl {
      direction: rtl;
    }

    body.rtl .brand,
    body.rtl .top-bar {
      flex-direction: row-reverse;
    }

    @media (max-width: 600px) {
      .top-bar {
        padding: 12px 14px;
      }

      .brand {
        font-size: 16px;
      }

      .brand img {
        width: 36px;
        height: 36px;
      }

      .lang-switch button {
        padding: 7px 10px;
        font-size: 13px;
      }

      .container {
        margin: 20px auto;
        padding: 14px;
      }

      .card {
        padding: 22px;
      }

      h1 {
        font-size: 24px;
      }
    }
  </style>
</head>

<body>
  <div class="top-bar">
    <div class="brand">
      <img src="logo.png" alt="Vehicall Logo" />
      <span>Vehicall</span>
    </div>

    <div class="lang-switch">
      <button id="enBtn" onclick="setLanguage('en')">EN</button>
      <button id="arBtn" onclick="setLanguage('ar')">العربية</button>
    </div>
  </div>

  <div class="container">
    <div class="card">
      <img src="logo.png" class="logo" alt="Vehicall Logo" />

      <h1 id="pageTitle">Alert Vehicle Owner</h1>

      <p class="subtitle" id="pageSubtitle">
        Select the reason for alerting the vehicle owner. Your phone number will not be exposed.
      </p>

      <div class="vehicle-box">
        <div class="vehicle-label" id="vehicleLabel">Vehicle ID</div>
        <div class="vehicle-id" id="vehicleId">Loading...</div>
      </div>

      <div class="alerts">
        <button class="alert-btn" onclick="sendAlert('blocking')" id="blockingBtn">
          🚗 Your car is blocking
        </button>

        <button class="alert-btn" onclick="sendAlert('lights')" id="lightsBtn">
          💡 Lights are on
        </button>

        <button class="alert-btn" onclick="sendAlert('unlocked')" id="unlockedBtn">
          🔓 Vehicle not locked
        </button>

        <button class="alert-btn" onclick="sendAlert('attention')" id="attentionBtn">
          ⚠️ Vehicle needs attention
        </button>

        <button class="alert-btn emergency" onclick="sendAlert('emergency')" id="emergencyBtn">
          🚨 Emergency / Accident
        </button>
      </div>

      <div class="message-box" id="messageBox"></div>

      <div class="footer-note" id="footerNote">
        Vehicall protects privacy by allowing alerts without revealing personal phone numbers.
      </div>
    </div>
  </div>

  <script>
    const translations = {
      en: {
        title: "Alert Vehicle Owner",
        subtitle: "Select the reason for alerting the vehicle owner. Your phone number will not be exposed.",
        vehicleLabel: "Vehicle ID",
        blocking: "🚗 Your car is blocking",
        lights: "💡 Lights are on",
        unlocked: "🔓 Vehicle not locked",
        attention: "⚠️ Vehicle needs attention",
        emergency: "🚨 Emergency / Accident",
        footer: "Vehicall protects privacy by allowing alerts without revealing personal phone numbers.",
        alertSent: "Alert sent successfully. The vehicle owner has been notified securely through Vehicall.",
        loading: "Loading..."
      },
      ar: {
        title: "تنبيه صاحب المركبة",
        subtitle: "اختر سبب تنبيه صاحب المركبة. لن يتم إظهار رقم هاتفك.",
        vehicleLabel: "رقم المركبة",
        blocking: "🚗 السيارة تعيق المرور",
        lights: "💡 أضواء السيارة تعمل",
        unlocked: "🔓 المركبة غير مقفلة",
        attention: "⚠️ المركبة تحتاج إلى انتباه",
        emergency: "🚨 حالة طارئة / حادث",
        footer: "تحافظ فيهيكال على الخصوصية من خلال إرسال التنبيهات دون إظهار أرقام الهواتف الشخصية.",
        alertSent: "تم إرسال التنبيه بنجاح. تم إشعار صاحب المركبة بشكل آمن عبر فيهيكال.",
        loading: "جاري التحميل..."
      }
    };

    let currentLang = localStorage.getItem("vehicall_lang") || "en";

    function setLanguage(lang) {
      currentLang = lang;
      localStorage.setItem("vehicall_lang", lang);
      applyLanguage();
    }

    function applyLanguage() {
      const t = translations[currentLang];

      document.documentElement.lang = currentLang;
      document.body.classList.toggle("rtl", currentLang === "ar");

      document.getElementById("pageTitle").innerText = t.title;
      document.getElementById("pageSubtitle").innerText = t.subtitle;
      document.getElementById("vehicleLabel").innerText = t.vehicleLabel;
      document.getElementById("blockingBtn").innerText = t.blocking;
      document.getElementById("lightsBtn").innerText = t.lights;
      document.getElementById("unlockedBtn").innerText = t.unlocked;
      document.getElementById("attentionBtn").innerText = t.attention;
      document.getElementById("emergencyBtn").innerText = t.emergency;
      document.getElementById("footerNote").innerText = t.footer;

      document.getElementById("enBtn").classList.toggle("active", currentLang === "en");
      document.getElementById("arBtn").classList.toggle("active", currentLang === "ar");
    }

    function getVehicleIdFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get("vehicle") || params.get("id") || "VEHICALL";
    }

    function loadVehicleId() {
      const vehicleId = getVehicleIdFromUrl();
      document.getElementById("vehicleId").innerText = vehicleId;
    }

    function sendAlert(type) {
      const t = translations[currentLang];
      const vehicleId = getVehicleIdFromUrl();

      const alertData = {
        vehicleId: vehicleId,
        alertType: type,
        language: currentLang,
        timestamp: new Date().toISOString()
      };

      console.log("Vehicall Alert:", alertData);

      document.getElementById("messageBox").style.display = "block";
      document.getElementById("messageBox").innerText = t.alertSent;
    }

    applyLanguage();
    loadVehicleId();
  </script>
</body>
</html>
