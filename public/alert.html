<!DOCTYPE html>
<html>
<head>
<title>Vehicall Alert</title>

<style>
body {
  background: linear-gradient(135deg,#031b3b,#062850);
  font-family: Arial;
  text-align:center;
  padding:20px;
  color:white;
}

.logo {
  width:100px;
  margin-bottom:10px;
}

.btn {
  width:90%;
  padding:16px;
  margin:8px;
  border-radius:14px;
  border:none;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}

.red { background:#ef4444; color:white; }
.blue { background:#2563eb; color:white; }
.yellow { background:#facc15; color:black; }
.green { background:#22c55e; color:white; }
.gray { background:#6b7280; color:white; }

.alert-box {
  margin-top:20px;
  padding:16px;
  border-radius:12px;
  background: rgba(255,255,255,0.12);
  color:#fef08a;
  font-weight:bold;
  white-space: pre-line;
}

.open-wa {
  margin-top:12px;
  background:#22c55e;
  color:white;
}
</style>
</head>

<body>

<img src="/logo.png" class="logo">

<h2>Vehicall Alert</h2>
<p id="qrDisplay"></p>

<button class="btn red" onclick="sendAlert('EMERGENCY')">🚨 Emergency</button>
<button class="btn blue" onclick="sendAlert('BLOCKING')">🚗 Your Car is Blocking</button>
<button class="btn yellow" onclick="sendAlert('LIGHTS_ON')">💡 Lights ON</button>
<button class="btn green" onclick="sendAlert('NOT_LOCKED')">🔓 Vehicle Not Locked</button>
<button class="btn gray" onclick="sendAlert('NEED_ATTENTION')">⚠️ Vehicle Needs Attention</button>

<div id="response"></div>

<script>
const params = new URLSearchParams(window.location.search);
const qr_id = params.get('qr');

document.getElementById('qrDisplay').innerText = qr_id
  ? "Vehicle ID: " + qr_id
  : "Invalid QR";

function getCurrentTime(){
  const now = new Date();
  const options = {
    day: '2-digit',
    month: 'short',
    year: 'numeric',
    hour: '2-digit',
    minute: '2-digit'
  };
  return now.toLocaleString('en-GB', options);
}

function cleanOmanMobile(mobile) {
  let number = String(mobile || '').replace(/\D/g, '');
  if (number.startsWith('968')) return number;
  if (number.startsWith('0')) number = number.substring(1);
  return '968' + number;
}

function openWhatsApp(phone, vehicle, issue, time) {
  const message = `Vehicall Alert

Vehicle: ${vehicle}
Issue: ${issue}
Time: ${time}

Please check your vehicle.`;

  const whatsappURL = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
  window.location.href = whatsappURL;
}

async function sendAlert(type){
  if(!qr_id){
    alert("Invalid QR Code");
    return;
  }

  try {
    const res = await fetch('/send-alert',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({qr_id, alert_type:type})
    });

    const data = await res.json();

    if(!res.ok){
      document.getElementById('response').innerHTML =
        `<div class="alert-box">${data.message}</div>`;
      return;
    }

    const time = getCurrentTime();
    const contacts = Array.isArray(data.contacts) && data.contacts.length
      ? data.contacts
      : [{ name: 'Primary Contact', mobile: data.mobile, primary: true, active: true }];

    let buttons = '';

    contacts.forEach((contact, index) => {
      const phone = cleanOmanMobile(contact.mobile);
      const label = contact.primary ? 'Primary Contact' : (contact.name || 'Additional Contact');

      buttons += `
        <button class="btn open-wa" onclick="openWhatsApp('${phone}', '${data.vehicleNumber}', '${data.issue}', '${time}')">
          Open WhatsApp - ${label}
        </button>
      `;
    });

    document.getElementById('response').innerHTML = `
      <div class="alert-box">
Vehicall Alert Created

Vehicle: ${data.vehicleNumber}
Issue: ${data.issue}
Time: ${time}

Choose contact below to open WhatsApp.
      </div>
      ${buttons}
    `;

    const firstPhone = cleanOmanMobile(contacts[0].mobile);
    openWhatsApp(firstPhone, data.vehicleNumber, data.issue, time);

  } catch (error){
    document.getElementById('response').innerHTML =
      `<div class="alert-box">Error sending alert</div>`;
    console.error(error);
  }
}
</script>

</body>
</html>
