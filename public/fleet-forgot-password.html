<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fleet Forgot Password</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#07111f;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.box{
  width:100%;
  max-width:420px;
  background:#0f1f33;
  padding:30px;
  border-radius:20px;
  border:1px solid #20344d;
}

h1{
  margin-top:0;
}

label{
  display:block;
  margin-top:15px;
  margin-bottom:8px;
}

input{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid #29496d;
  background:#081827;
  color:#fff;
  box-sizing:border-box;
}

button{
  width:100%;
  margin-top:20px;
  padding:14px;
  border:none;
  border-radius:14px;
  background:linear-gradient(135deg,#00c2ff,#0066ff);
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

#message{
  margin-bottom:15px;
  padding:12px;
  border-radius:10px;
  display:none;
}

.success{
  display:block !important;
  background:rgba(0,180,120,.15);
  color:#70ffc8;
}

.error{
  display:block !important;
  background:rgba(255,70,70,.15);
  color:#ff9c9c;
}
</style>
</head>
<body>

<div class="box">

<h1>Fleet Password Reset</h1>

<div id="message"></div>

<label>Email</label>
<input type="email" id="email">

<label>New Password</label>
<input type="password" id="password">

<button onclick="resetPassword()">
Reset Password
</button>

</div>

<script>
function showMessage(text, type){
  const box = document.getElementById("message");
  box.style.display = "block";
  box.className = type;
  box.textContent = text;
}

async function resetPassword(){

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!email || !password) {
    showMessage("Email and new password are required", "error");
    return;
  }

  try {
    const res = await fetch("/api/fleet/reset-password", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        email,
        password
      })
    });

    const data = await res.json();

    showMessage(
      data.message || "Password reset completed",
      data.success ? "success" : "error"
    );

  } catch (err) {
    console.error(err);
    showMessage("Server error. Please check if node server is running.", "error");
  }
}
</script>

</body>
</html>
