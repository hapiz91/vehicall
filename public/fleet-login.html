<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vehicall Fleet Login</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #07111f;
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .login-box {
      width: 100%;
      max-width: 460px;
      background: #0f1f33;
      border: 1px solid #20344d;
      border-radius: 22px;
      padding: 35px;
      box-sizing: border-box;
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
    }

    .logo {
      text-align: center;
      margin-bottom: 24px;
    }

    .logo img {
      height: 65px;
      width: auto;
      margin-bottom: 12px;
    }

    .logo h1 {
      margin: 0;
      font-size: 28px;
    }

    .logo p {
      margin-top: 8px;
      color: #9fb0c5;
      line-height: 1.5;
      font-size: 14px;
    }

    .input-group {
      margin-bottom: 18px;
    }

    .input-group label {
      display: block;
      margin-bottom: 8px;
      color: #c7d7e7;
      font-size: 14px;
    }

    .input-group input {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #29496d;
      background: #081827;
      color: #ffffff;
      box-sizing: border-box;
      font-size: 15px;
    }

    .login-btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #00c2ff, #0066ff);
      color: #ffffff;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    .login-btn:hover {
      opacity: 0.92;
    }

    .links {
      text-align: center;
      margin-top: 20px;
    }

    .links a {
      color: #6ecbff;
      text-decoration: none;
      font-size: 14px;
    }

    .message {
      margin-top: 18px;
      padding: 12px;
      border-radius: 12px;
      display: none;
      font-size: 14px;
    }

    .success {
      display: block;
      background: rgba(0,180,120,0.15);
      border: 1px solid rgba(0,180,120,0.35);
      color: #70ffc8;
    }

    .error {
      display: block;
      background: rgba(255,70,70,0.15);
      border: 1px solid rgba(255,70,70,0.35);
      color: #ff9c9c;
    }

    @media (max-width: 520px) {
      .login-box {
        margin: 18px;
        padding: 28px;
      }

      .logo img {
        height: 55px;
      }
    }
  </style>
</head>

<body>

  <div class="login-box">

    <div class="logo">
      <img src="/logo.png" alt="Vehicall Logo">

      <h1>Vehicall Fleet</h1>

      <p>
        Smart Fleet Operations, Vehicle Accountability
        & Vehicall Alert Management
      </p>
    </div>

    <form id="fleetLoginForm">

      <div class="input-group">
        <label>Company Email</label>
        <input
          type="email"
          name="email"
          placeholder="Enter company email"
          required
        />
      </div>

      <div class="input-group">
        <label>Password</label>
        <input
          type="password"
          name="password"
          placeholder="Enter password"
          required
        />
      </div>

      <button type="submit" class="login-btn">
        Login to Fleet Dashboard
      </button>
<div style="margin-top:15px;text-align:center;">
  <a href="/fleet-forgot-password"
     style="color:#6ecbff;text-decoration:none;font-size:14px;">
     Forgot Password?
  </a>
</div>

    </form>

    <div id="message" class="message"></div>

    <div class="links">
      <a href="/fleet-register">
        Register Fleet Company
      </a>

      <br><br>

      <a href="/">
        Back to Vehicall
      </a>
    </div>

  </div>

  <script>
    const form = document.getElementById("fleetLoginForm");
    const messageBox = document.getElementById("message");

    function showMessage(text, type) {
      messageBox.className = `message ${type}`;
      messageBox.textContent = text;
    }

    form.addEventListener("submit", async function(e) {
      e.preventDefault();

      const formData = new FormData(form);
      const data = Object.fromEntries(formData.entries());

      try {

        const response = await fetch("/api/fleet/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(data)
        });

        const result = await response.json();

        if (result.success) {

          showMessage("Login successful. Redirecting...", "success");

          setTimeout(() => {
            window.location.href = "/fleet-dashboard";
          }, 1200);

        } else {

          showMessage(
            result.message || "Invalid login credentials",
            "error"
          );
        }

      } catch (error) {
        console.error(error);

        showMessage(
          "Server error. Please try again.",
          "error"
        );
      }
    });
  </script>

</body>
</html>
