<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vehicall Fleet Registration</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #07111f;
      color: #ffffff;
    }

    .container {
      max-width: 820px;
      margin: 40px auto;
      padding: 30px;
      background: #0f1f33;
      border-radius: 18px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
    }

    .logo-box {
      text-align: center;
      margin-bottom: 25px;
    }

    .logo-box img {
      height: 70px;
      margin-bottom: 12px;
    }

    .logo-box h1 {
      margin: 0;
      color: #ffffff;
    }

    .logo-box p {
      color: #b7c4d4;
      margin-top: 8px;
    }

    .section-title {
      margin-top: 30px;
      margin-bottom: 12px;
      color: #6ecbff;
      font-size: 18px;
      border-bottom: 1px solid #263b55;
      padding-bottom: 8px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    input, select, textarea {
      width: 100%;
      padding: 13px;
      border-radius: 10px;
      border: 1px solid #263b55;
      background: #081827;
      color: #ffffff;
      box-sizing: border-box;
    }

    textarea {
      grid-column: span 2;
      min-height: 90px;
      resize: vertical;
    }

    .full {
      grid-column: span 2;
    }

    button {
      width: 100%;
      margin-top: 24px;
      padding: 15px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #00c2ff, #0066ff);
      color: #ffffff;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    .links {
      margin-top: 20px;
      text-align: center;
    }

    .links a {
      color: #6ecbff;
      text-decoration: none;
      font-size: 14px;
    }

    #message {
      margin-top: 18px;
      padding: 12px;
      border-radius: 10px;
      display: none;
    }

    .success {
      display: block !important;
      background: rgba(0, 180, 120, 0.15);
      color: #70ffc8;
      border: 1px solid rgba(0, 180, 120, 0.35);
    }

    .error {
      display: block !important;
      background: rgba(255, 70, 70, 0.15);
      color: #ff9c9c;
      border: 1px solid rgba(255, 70, 70, 0.35);
    }

    @media (max-width: 700px) {
      .container {
        margin: 20px;
        padding: 22px;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }

      .full,
      textarea {
        grid-column: span 1;
      }

      .logo-box img {
        height: 58px;
      }
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="logo-box">
      <img src="/logo.png" alt="Vehicall Logo" />
      <h1>Vehicall Fleet Management</h1>
      <p>Smart Alerts, Fleet Operations & Driver Accountability</p>
    </div>

    <form id="fleetRegisterForm">

      <div class="section-title">Company Details</div>

      <div class="form-grid">
        <input type="text" name="companyName" placeholder="Company Name" required />
        <input type="text" name="crNumber" placeholder="CR Number" required />

        <input type="text" name="contactPerson" placeholder="Contact Person" required />
        <input type="tel" name="mobile" placeholder="Company Mobile Number" required />

        <input type="text" name="industryType" placeholder="Industry Type e.g. Logistics, Delivery" class="full" />

        <textarea name="address" placeholder="Company Address"></textarea>
      </div>

      <div class="section-title">Fleet Admin User Creation</div>

      <div class="form-grid">
        <input type="text" name="adminName" placeholder="Fleet Admin Name" required />
        <input type="text" name="adminDesignation" placeholder="Designation e.g. Fleet Manager" />

        <input type="email" name="email" placeholder="Fleet Admin Login Email" required />
        <input type="password" name="password" placeholder="Create Fleet Admin Password" required />
      </div>

      <div class="section-title">Package Selection</div>

      <div class="form-grid">
        <select name="packageType" required>
          <option value="">Select Fleet Package</option>
          <option value="starter">Starter Fleet - Up to 10 Vehicles</option>
          <option value="business">Business Fleet - Up to 50 Vehicles</option>
          <option value="enterprise">Enterprise Fleet - Up to 100 Vehicles</option>
        </select>

        <select name="alertOption" required>
          <option value="">Select Alert Option</option>
          <option value="without_alerts">Fleet Management Only</option>
          <option value="with_alerts">Fleet Management + Vehicall Alerts</option>
        </select>
      </div>

      <button type="submit">Register Fleet Company</button>
    </form>

    <div id="message"></div>

    <div class="links">
      <a href="/fleet-login.html">Already approved? Login to Fleet Dashboard</a>
      <br><br>
      <a href="/">Back to Vehicall</a>
    </div>
  </div>

  <script>
    const form = document.getElementById("fleetRegisterForm");
    const messageBox = document.getElementById("message");

    function showMessage(text, type) {
      messageBox.className = type;
      messageBox.textContent = text;
    }

    form.addEventListener("submit", async function(e) {
      e.preventDefault();

      const formData = new FormData(form);
      const data = Object.fromEntries(formData.entries());

      try {
        const response = await fetch("/api/fleet/register", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(data)
        });

        const result = await response.json();

        if (result.success) {
          showMessage(result.message, "success");
          form.reset();
        } else {
          showMessage(result.message || "Registration failed", "error");
        }

      } catch (error) {
        console.error(error);
        showMessage("Server error. Please try again.", "error");
      }
    });
  </script>

</body>
</html>
