<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vehicall | Reset Password</title>
  <link rel="stylesheet" href="auth.css" />
</head>
<body>

  <div class="auth-page">
    <div class="auth-left">
      <a href="/login.html" class="back-link">← Back to Login</a>

      <div class="brand-box">
        <img src="/logo.png" class="auth-logo" />
        <div>
          <h1>Vehicall</h1>
          <p>Smart QR Vehicle Alert System</p>
        </div>
      </div>

      <h2>Reset your Vehicall password securely.</h2>
      <p class="hero-text">
        Enter your registered vehicle number and mobile number to reset your password.
      </p>

      <div class="benefits">
        <div>✓ Vehicle number verification</div>
        <div>✓ Registered mobile verification</div>
        <div>✓ New password will be encrypted</div>
      </div>
    </div>

    <div class="auth-right">
      <div class="auth-card">
        <div id="messageBox"></div>

        <form id="resetForm" class="form-section">
          <h3>Reset Password</h3>

          <label>Vehicle Number</label>
          <input type="text" id="vehicleNumber" placeholder="Example: M 12345" required />

          <label>Registered Mobile Number</label>
          <input type="text" id="mobile" placeholder="968XXXXXXXX" required />

          <label>New Password</label>
          <input type="password" id="newPassword" placeholder="Minimum 6 characters" required />

          <label>Confirm New Password</label>
          <input type="password" id="confirmPassword" placeholder="Re-enter new password" required />

          <button type="submit" class="primary-btn">Reset Password</button>
        </form>
      </div>
    </div>
  </div>

  <script>
    function showMessage(message, type = 'success') {
      const box = document.getElementById('messageBox');
      box.innerText = message;
      box.className = type;

      setTimeout(() => {
        box.innerText = '';
        box.className = '';
      }, 5000);
    }

    document.getElementById('resetForm').addEventListener('submit', async function(e) {
      e.preventDefault();

      const vehicleNumber = document.getElementById('vehicleNumber').value;
      const mobile = document.getElementById('mobile').value;
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (newPassword !== confirmPassword) {
        showMessage('Passwords do not match', 'error');
        return;
      }

      const res = await fetch('/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          vehicleNumber,
          mobile,
          newPassword
        })
      });

      const data = await res.json();

      if (res.ok) {
        showMessage(data.message, 'success');

        setTimeout(() => {
          window.location.href = '/login.html';
        }, 1800);
      } else {
        showMessage(data.message || 'Password reset failed', 'error');
      }
    });
  </script>

</body>
</html>
