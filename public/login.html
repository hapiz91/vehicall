<!DOCTYPE html>
<html>
<head>
<title>Vehicall Login</title>

<style>
body {
  background: linear-gradient(135deg,#031b3b,#062850);
  font-family: Arial;
  text-align:center;
  padding:20px;
  color:white;
}

.container {
  max-width:400px;
  margin:auto;
  margin-top:60px;
  padding:20px;
  border-radius:16px;
  background:rgba(255,255,255,0.08);
}

input {
  width:90%;
  padding:12px;
  margin:10px;
  border-radius:10px;
  border:none;
}

button {
  width:90%;
  padding:14px;
  margin:10px;
  border-radius:12px;
  border:none;
  font-weight:bold;
  cursor:pointer;
  color:white;
}

.login {
  background:#22c55e;
}

.register {
  background:#3b82f6;
}
</style>
</head>

<body>

<div class="container">

<h2>Vehicall</h2>
<p>Login with your vehicle number</p>

<input id="vehicleNumber" placeholder="Vehicle Number">
<input id="password" type="password" placeholder="Password">

<button class="login" onclick="login()">Login</button>
<button class="register" onclick="goRegister()">Create New Account</button>

<p id="msg"></p>

</div>

<script>
async function login(){

  const vehicleNumber = document.getElementById('vehicleNumber').value.trim();
  const password = document.getElementById('password').value.trim();

  const res = await fetch('/login',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({vehicleNumber, password})
  });

  const data = await res.json();

  if(!res.ok){
    document.getElementById('msg').innerText = data.message;
    return;
  }

  // ✅ IMPORTANT FIX
  localStorage.setItem('isLoggedIn','true');
  localStorage.setItem('vehicleNumber', data.vehicleNumber);

  // redirect
  window.location.href = '/dashboard.html';
}

function goRegister(){
  window.location.href = '/register.html';
}
</script>

</body>
</html>
