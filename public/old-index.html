<!DOCTYPE html>
<html>
<head>
    <title>Vehicall Alert</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #0a1a2f;
            color: white;
        }

        h1 {
            margin-top: 20px;
        }

        .btn {
            display: block;
            width: 80%;
            margin: 12px auto;
            padding: 18px;
            font-size: 18px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        .red { background: #ff3b3b; }
        .blue { background: #3b82f6; }
        .yellow { background: #facc15; color: black; }
        .green { background: #22c55e; }
        .gray { background: #6b7280; }

        #status {
            margin-top: 20px;
            font-size: 18px;
        }

        a {
            color: #4ade80;
            font-weight: bold;
            text-decoration: none;
        }
    </style>
</head>

<body>

<h1>🚗 Vehicall Alert</h1>
<p>Tap to notify vehicle owner</p>

<button class="btn red" onclick="sendAlert('Emergency')">🚨 Emergency</button>
<button class="btn blue" onclick="sendAlert('Blocking')">🚗 Your Car is Blocking</button>
<button class="btn yellow" onclick="sendAlert('Lights')">💡 Lights ON</button>
<button class="btn green" onclick="sendAlert('Unlocked')">🔓 Vehicle Not Locked</button>
<button class="btn gray" onclick="sendAlert('Attention')">⚠️ Needs Attention</button>

<div id="status"></div>

<script>
let vehicleId = window.location.pathname.split("/").pop();

function sendAlert(type) {
    fetch("/alert", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            type: type,
            vehicleId: vehicleId
        })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("status").innerHTML =
            `✅ Alert Ready <br><a href="${data.link}" target="_blank">📲 Send via WhatsApp</a>`;
    })
    .catch(() => {
        document.getElementById("status").innerText = "❌ Error sending alert";
    });
}
</script>

</body>
</html>
