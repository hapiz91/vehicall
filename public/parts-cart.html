<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vehicall Parts Cart</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#06101d;
      color:#fff;
      min-height:100vh;
    }

    .nav{
      position:sticky;
      top:0;
      z-index:999;
      background:rgba(5,13,24,.96);
      backdrop-filter:blur(14px);
      border-bottom:1px solid rgba(255,255,255,.08);
      padding:16px 5%;

      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:15px;
      flex-wrap:wrap;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      text-decoration:none;
      color:#f59e0b;
      font-weight:900;
      font-size:22px;
    }

    .brand img{
      width:54px;
      height:54px;
      object-fit:contain;
      background:#fff;
      border-radius:14px;
      padding:6px;
    }

    .container{
      width:min(1400px,95%);
      margin:auto;
      padding:30px 0 100px;
    }

    .top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:20px;
      flex-wrap:wrap;
      margin-bottom:25px;
    }

    h1{
      font-size:34px;
    }

    .subtitle{
      color:#94a3b8;
      margin-top:6px;
    }

    .back-btn{
      background:#0f1f33;
      border:1px solid #29496d;
      color:#fff;
      padding:12px 16px;
      border-radius:14px;
      text-decoration:none;
      font-weight:900;
    }

    .shop-group{
      margin-bottom:35px;
      background:#0f1f33;
      border:1px solid #20344d;
      border-radius:24px;
      overflow:hidden;
    }

    .shop-header{
      padding:20px;
      border-bottom:1px solid rgba(255,255,255,.08);

      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:15px;
      flex-wrap:wrap;
    }

    .shop-header h2{
      font-size:24px;
      margin-bottom:6px;
    }

    .shop-meta{
      color:#94a3b8;
      font-size:14px;
    }

    .request-btn{
      background:linear-gradient(135deg,#f59e0b,#fb923c);
      color:#111827;
      border:none;
      padding:14px 20px;
      border-radius:14px;
      font-weight:900;
      cursor:pointer;
    }

    .cart-list{
      display:flex;
      flex-direction:column;
    }

    .cart-item{
      display:grid;
      grid-template-columns:90px 1fr auto;
      gap:18px;
      align-items:center;

      padding:18px 20px;
      border-bottom:1px solid rgba(255,255,255,.08);
    }

    .cart-item:last-child{
      border-bottom:none;
    }

    .part-image{
      width:90px;
      height:90px;
      border-radius:18px;
      overflow:hidden;
      background:#081827;

      display:flex;
      align-items:center;
      justify-content:center;

      font-size:38px;
    }

    .part-image img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .part-info h3{
      font-size:20px;
      margin-bottom:8px;
    }

    .part-meta{
      color:#94a3b8;
      line-height:1.7;
      font-size:14px;
    }

    .price{
      margin-top:12px;
      color:#f59e0b;
      font-size:24px;
      font-weight:900;
    }

    .item-actions{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .remove-btn{
      background:#ef4444;
      color:#fff;
      border:none;
      padding:12px 14px;
      border-radius:14px;
      font-weight:900;
      cursor:pointer;
    }

    .whatsapp-btn{
      background:#22c55e;
      color:#052e16;
      border:none;
      padding:12px 14px;
      border-radius:14px;
      font-weight:900;
      cursor:pointer;
      text-decoration:none;
      text-align:center;
    }

    .empty{
      background:#0f1f33;
      border:1px solid #20344d;
      border-radius:24px;
      padding:60px 20px;
      text-align:center;
      color:#94a3b8;
    }

    .customer-box{
      margin-bottom:25px;
      background:#0f1f33;
      border:1px solid #20344d;
      border-radius:24px;
      padding:20px;
    }

    .customer-box input,
    .customer-box textarea{
      width:100%;
      margin-top:12px;
      background:#081827;
      border:1px solid #29496d;
      color:#fff;
      padding:14px;
      border-radius:14px;
      outline:none;
    }

    @media(max-width:800px){

      .cart-item{
        grid-template-columns:1fr;
      }

      .item-actions{
        flex-direction:row;
      }

      .request-btn,
      .remove-btn,
      .whatsapp-btn{
        flex:1;
      }

    }

  </style>
</head>

<body>

<nav class="nav">

  <a href="/parts-marketplace.html" class="brand">
    <img src="/images/vehicall-logo.png"
         onerror="this.src='/logo.png'">

    <span>Vehicall Parts</span>
  </a>

  <a href="/parts-marketplace.html" class="back-btn">
    ← Continue Shopping
  </a>

</nav>

<div class="container">

  <div class="top">
    <div>
      <h1>🛒 My Cart</h1>
      <div class="subtitle">
        Save parts and send requests directly to shops.
      </div>
    </div>
  </div>

  <div class="customer-box">

    <h3>Customer Details</h3>

    <input
      type="text"
      id="customerName"
      placeholder="Your name"
    >

    <textarea
      id="customerMessage"
      rows="4"
      placeholder="Additional message to the shop..."
    ></textarea>

  </div>

  <div id="cartContainer">

    <div class="empty">
      Loading cart...
    </div>

  </div>

</div>

<script>

let cartItems = [];

function getCustomerMobile(){
  return localStorage.getItem('vehicall_customer_mobile') || '';
}

async function loadCart(){

  const mobile = getCustomerMobile();

  if(!mobile){

    document.getElementById('cartContainer').innerHTML = `
      <div class="empty">
        No customer profile found.<br><br>
        Please add items from marketplace first.
      </div>
    `;

    return;
  }

  try{

    const res = await fetch(`/api/parts/cart/${mobile}`);
    const data = await res.json();

    cartItems = data.items || [];

    renderCart();

  }catch(err){

    console.error(err);

    document.getElementById('cartContainer').innerHTML = `
      <div class="empty">
        Unable to load cart.
      </div>
    `;
  }

}

function groupByShop(items){

  const grouped = {};

  items.forEach(item => {

    if(!grouped[item.shopId]){
      grouped[item.shopId] = [];
    }

    grouped[item.shopId].push(item);

  });

  return grouped;
}

function renderCart(){

  const container = document.getElementById('cartContainer');

  if(!cartItems.length){

    container.innerHTML = `
      <div class="empty">
        Your cart is empty.
      </div>
    `;

    return;
  }

  const grouped = groupByShop(cartItems);

  container.innerHTML = Object.keys(grouped).map(shopId => {

    const items = grouped[shopId];
    const shop = items[0];

    return `
      <div class="shop-group">

        <div class="shop-header">

          <div>
            <h2>${shop.shopName || '-'}</h2>

            <div class="shop-meta">
              ${items.length} item(s)
            </div>
          </div>

          <button
            class="request-btn"
            onclick="sendRequest('${shopId}')"
          >
            Send Request
          </button>

        </div>

        <div class="cart-list">

          ${items.map(item => {

            const whatsappLink =
              `https://wa.me/${String(item.shopWhatsapp || '').replace(/\D/g,'')}`;

            return `
              <div class="cart-item">

                <div class="part-image">

                  ${
                    item.imageUrl
                    ? `<img src="${item.imageUrl}">`
                    : `⚙️`
                  }

                </div>

                <div class="part-info">

                  <h3>${item.partName || '-'}</h3>

                  <div class="part-meta">

                    Brand:
                    ${item.brand || '-'}<br>

                    Model:
                    ${item.model || '-'}
                  </div>

                  <div class="price">
                    ${Number(item.price || 0).toFixed(3)} OMR
                  </div>

                </div>

                <div class="item-actions">

                  <a
                    href="${whatsappLink}"
                    target="_blank"
                    class="whatsapp-btn"
                  >
                    WhatsApp
                  </a>

                  <button
                    class="remove-btn"
                    onclick="removeCartItem('${item.id}')"
                  >
                    Remove
                  </button>

                </div>

              </div>
            `;

          }).join('')}

        </div>

      </div>
    `;

  }).join('');

}

async function removeCartItem(cartId){

  if(!confirm('Remove item from cart?')) return;

  try{

    const res = await fetch('/api/parts/cart/remove',{

      method:'POST',

      headers:{
        'Content-Type':'application/json'
      },

      body:JSON.stringify({
        cartId
      })

    });

    const data = await res.json();

    if(data.success){

      cartItems =
        cartItems.filter(x => x.id !== cartId);

      renderCart();

    }else{

      alert(data.message || 'Unable to remove');

    }

  }catch(err){

    console.error(err);
    alert('Unable to remove item');

  }

}

async function sendRequest(shopId){

  const customerMobile = getCustomerMobile();

  if(!customerMobile){
    alert('Customer profile not found');
    return;
  }

  const customerName =
    document.getElementById('customerName').value;

  const customerMessage =
    document.getElementById('customerMessage').value;

  try{

    const res = await fetch('/api/parts/cart/send-request',{

      method:'POST',

      headers:{
        'Content-Type':'application/json'
      },

      body:JSON.stringify({
        customerMobile,
        customerName,
        customerMessage,
        shopId
      })

    });

    const data = await res.json();

    if(data.success){

      alert(
        'Request sent successfully.\n\nToken: ' +
        data.requestToken
      );

      loadCart();

    }else{

      alert(data.message || 'Unable to send request');

    }

  }catch(err){

    console.error(err);
    alert('Unable to send request');

  }

}

loadCart();

</script>

</body>
</html>
